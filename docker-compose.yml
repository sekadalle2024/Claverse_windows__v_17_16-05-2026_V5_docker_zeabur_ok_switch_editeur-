version: '3.8'

services:
  # ============================================
  # SERVICE BACKEND (Python + FastAPI)
  # ============================================
  backend:
    build:
      context: ./py_backend
      dockerfile: Dockerfile
    container_name: claraverse-backend
    ports:
      - "8080:8080"
    environment:
      # Configuration serveur
      - HOST=0.0.0.0
      - PORT=8080
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      
      # CORS Configuration
      - CORS_ORIGINS=https://prclaravi.zeabur.app,http://localhost:3000,http://localhost:5173
      - CORS_ALLOW_CREDENTIALS=true
      - CORS_ALLOW_METHODS=GET,POST,PUT,DELETE,OPTIONS
      - CORS_ALLOW_HEADERS=*
      - CORS_EXPOSE_HEADERS=Content-Disposition,Content-Type,Content-Length
      
      # Application
      - APP_ENV=production
      - LOG_LEVEL=info
    volumes:
      - backend-data:/app/data
    networks:
      - claraverse-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    labels:
      - "com.claraverse.service=backend"
      - "com.claraverse.version=1.0.0"

  # ============================================
  # SERVICE FRONTEND (React + TypeScript + Nginx)
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - NODE_ENV=production
    container_name: claraverse-frontend
    ports:
      - "80:80"
    environment:
      - VITE_APP_NAME=Claraverse
      - VITE_BACKEND_URL=https://pybackend.zeabur.app
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - claraverse-network
    restart: unless-stopped
    labels:
      - "com.claraverse.service=frontend"
      - "com.claraverse.version=1.0.0"

# ============================================
# NETWORKS
# ============================================
networks:
  claraverse-network:
    driver: bridge
    name: claraverse-network

# ============================================
# VOLUMES
# ============================================
volumes:
  backend-data:
    driver: local
    name: claraverse-backend-data
