<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemple - Menu Démarrer</title>
  <link rel="stylesheet" href="demarrer-menu.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }
    .demo-container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .demo-header {
      margin-bottom: 30px;
    }
    .demo-controls {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }
    .demo-btn {
      padding: 8px 16px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 6px;
      cursor: pointer;
    }
    .demo-btn:hover {
      background: #f0f0f0;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <div class="demo-header">
      <h1>Exemple - Menu Démarrer Claraverse</h1>
      <p>Démonstration du style CSS du composant DemarrerMenu</p>
    </div>

    <div class="demo-controls">
      <button class="demo-btn" onclick="toggleDarkMode()">🌓 Mode Sombre</button>
      <button class="demo-btn" onclick="resetMenu()">🔄 Réinitialiser</button>
    </div>

    <!-- Menu Démarrer -->
    <div class="demarrer-relative">
      <button id="demarrer-btn" class="demarrer-button">
        <svg class="demarrer-button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        <span>Démarrer</span>
      </button>


      <div id="demarrer-menu" class="demarrer-menu demarrer-hidden">
        <!-- En-tête -->
        <div class="demarrer-menu-header">
          <div class="demarrer-menu-title">
            <svg class="demarrer-menu-title-icon" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <span class="demarrer-menu-title-text">Menu Démarrer</span>
          </div>
          <button class="demarrer-menu-close" onclick="closeMenu()">
            <svg class="demarrer-menu-close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>

        <!-- Contenu -->
        <div class="demarrer-menu-content">
          <!-- E-audit pro -->
          <button class="demarrer-logiciel-button" onclick="toggleLogiciel('e-audit')">
            <span class="demarrer-logiciel-icon">📋</span>
            <span class="demarrer-logiciel-label">E-audit pro</span>
            <svg class="demarrer-logiciel-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>

          <div id="e-audit-phases" class="demarrer-phases-container demarrer-hidden">
            <div class="demarrer-phase-header">Phase de préparation</div>
            
            <button class="demarrer-etape-button" onclick="showSubmenu(event, 'collecte')">
              <span class="demarrer-etape-icon">🔍</span>
              <span class="demarrer-etape-label">Collecte documentaire</span>
              <svg class="demarrer-etape-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>

            <button class="demarrer-etape-button" onclick="showSubmenu(event, 'cartographie')">
              <span class="demarrer-etape-icon">🗺️</span>
              <span class="demarrer-etape-label">Cartographie des risques</span>
              <svg class="demarrer-etape-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
          </div>

          <!-- E-revision -->
          <button class="demarrer-logiciel-button" onclick="toggleLogiciel('e-revision')">
            <span class="demarrer-logiciel-icon">🧮</span>
            <span class="demarrer-logiciel-label">E-revision</span>
            <svg class="demarrer-logiciel-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>

          <div id="e-revision-phases" class="demarrer-phases-container demarrer-hidden">
            <div class="demarrer-phase-header">Programme de contrôle</div>
            
            <button class="demarrer-cycle-button" onclick="toggleCycle('tresorerie')">
              <span class="demarrer-cycle-icon">💰</span>
              <span class="demarrer-cycle-label">Trésorerie</span>
              <svg class="demarrer-cycle-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>

            <div id="tresorerie-tests" class="demarrer-tests-container demarrer-hidden">
              <button class="demarrer-test-button" onclick="showSubmenu(event, 'aa040')">
                <span class="demarrer-test-reference">AA040</span>
                <span class="demarrer-test-label">Rapprochements</span>
                <svg class="demarrer-test-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>

              <button class="demarrer-test-button" onclick="showSubmenu(event, 'aa200')">
                <span class="demarrer-test-reference">AA200</span>
                <span class="demarrer-test-label">Caisse</span>
                <svg class="demarrer-test-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Sous-menu (Portail) -->
      <div id="demarrer-submenu" class="demarrer-submenu demarrer-hidden">
        <div class="demarrer-submenu-header">
          <div class="demarrer-submenu-title" id="submenu-title">Collecte documentaire</div>
          <div class="demarrer-submenu-norme" id="submenu-norme">Norme 14.6 Documentation relative à la mission</div>
        </div>
        
        <button class="demarrer-mode-button" onclick="selectMode('normal')">
          <span class="demarrer-mode-icon">👤</span>
          <span>Normal</span>
        </button>
        <button class="demarrer-mode-button" onclick="selectMode('demo')">
          <span class="demarrer-mode-icon">▶️</span>
          <span>Demo</span>
        </button>
        <button class="demarrer-mode-button" onclick="selectMode('avance')">
          <span class="demarrer-mode-icon">⚡</span>
          <span>Avancé</span>
        </button>
        <button class="demarrer-mode-button" onclick="selectMode('manuel')">
          <span class="demarrer-mode-icon">⚙️</span>
          <span>Manuel</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    // Gestion du bouton principal
    document.getElementById('demarrer-btn').addEventListener('click', function() {
      this.classList.toggle('active');
      document.getElementById('demarrer-menu').classList.toggle('demarrer-hidden');
    });

    // Fermer le menu
    function closeMenu() {
      document.getElementById('demarrer-btn').classList.remove('active');
      document.getElementById('demarrer-menu').classList.add('demarrer-hidden');
      document.getElementById('demarrer-submenu').classList.add('demarrer-hidden');
    }

    // Toggle logiciel
    function toggleLogiciel(id) {
      const phases = document.getElementById(id + '-phases');
      const button = event.currentTarget;
      
      button.classList.toggle('active');
      phases.classList.toggle('demarrer-hidden');
    }

    // Toggle cycle
    function toggleCycle(id) {
      const tests = document.getElementById(id + '-tests');
      const button = event.currentTarget;
      
      button.classList.toggle('active');
      tests.classList.toggle('demarrer-hidden');
    }

    // Afficher le sous-menu
    function showSubmenu(event, id) {
      const submenu = document.getElementById('demarrer-submenu');
      const button = event.currentTarget;
      const rect = button.getBoundingClientRect();
      
      // Positionner le sous-menu
      submenu.style.top = rect.top + 'px';
      submenu.style.left = (rect.right + 4) + 'px';
      
      // Afficher
      submenu.classList.remove('demarrer-hidden');
      
      // Marquer le bouton comme actif
      document.querySelectorAll('.demarrer-etape-button, .demarrer-test-button').forEach(b => {
        b.classList.remove('active');
      });
      button.classList.add('active');
    }

    // Sélectionner un mode
    function selectMode(mode) {
      alert('Mode sélectionné : ' + mode);
      closeMenu();
    }

    // Mode sombre
    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
    }

    // Réinitialiser
    function resetMenu() {
      closeMenu();
      document.querySelectorAll('.active').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.demarrer-phases-container, .demarrer-tests-container').forEach(el => {
        el.classList.add('demarrer-hidden');
      });
    }

    // Fermer en cliquant à l'extérieur
    document.addEventListener('click', function(e) {
      const menu = document.getElementById('demarrer-menu');
      const btn = document.getElementById('demarrer-btn');
      const submenu = document.getElementById('demarrer-submenu');
      
      if (!menu.contains(e.target) && !btn.contains(e.target) && !submenu.contains(e.target)) {
        closeMenu();
      }
    });
  </script>
</body>
</html>
