services:
  - type: web
    name: clara-backend-hobby
    env: python
    region: frankfurt
    plan: starter
    buildCommand: pip install -r py_backend/requirements.txt
    startCommand: python py_backend/main.py --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PYTHONDONTWRITEBYTECODE
        value: 1
      - key: HOST
        value: 0.0.0.0
